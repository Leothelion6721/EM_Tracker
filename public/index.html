<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EM Finder - REAL Electromagnetic Detection!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes ping {
            75%, 100% {
                transform: scale(2);
                opacity: 0;
            }
        }
        .animate-ping {
            animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        @keyframes pulse {
            50% {
                opacity: .5;
            }
        }
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Radio = () => (
            <svg className="w-12 h-12" fill="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="2"/>
                <circle cx="12" cy="12" r="6" fill="none" stroke="currentColor" strokeWidth="2"/>
                <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" strokeWidth="1"/>
            </svg>
        );
        
        const Zap = () => (
            <svg className="w-12 h-12" fill="currentColor" viewBox="0 0 24 24">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
        );

        const Upload = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
        );

        const MapPin = () => (
            <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
            </svg>
        );

        const Target = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" strokeWidth="2"/>
                <circle cx="12" cy="12" r="6" strokeWidth="2"/>
                <circle cx="12" cy="12" r="2" fill="currentColor"/>
            </svg>
        );

        const Wifi = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0" />
            </svg>
        );

        const Volume2 = () => (
            <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
            </svg>
        );

        const Camera = () => (
            <svg className="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        );

        const Smartphone = () => (
            <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                <rect x="5" y="2" width="14" height="20" rx="2" ry="2" fill="none" stroke="currentColor" strokeWidth="2"/>
                <line x1="12" y1="18" x2="12.01" y2="18" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
            </svg>
        );

        const AlertCircle = () => (
            <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" strokeWidth="2"/>
                <line x1="12" y1="8" x2="12" y2="12" strokeWidth="2" strokeLinecap="round"/>
                <line x1="12" y1="16" x2="12.01" y2="16" strokeWidth="2" strokeLinecap="round"/>
            </svg>
        );

        const CheckCircle = () => (
            <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const EMFinder = () => {
            const [floorPlan, setFloorPlan] = useState(null);
            const [scanning, setScanning] = useState(false);
            const [emFieldStrength, setEMFieldStrength] = useState(0);
            const [userPosition, setUserPosition] = useState({ x: 50, y: 50 });
            const [foundLocations, setFoundLocations] = useState([]);
            const [beepActive, setBeepActive] = useState(false);
            const audioContextRef = useRef(null);
            const [baselineEM, setBaselineEM] = useState(50);
            const scanIntervalRef = useRef(null);
            const magnetometerRef = useRef(null);

            // SENSOR STATUS
            const [sensorStatus, setSensorStatus] = useState('checking');
            const [sensorError, setSensorError] = useState('');
            const [realSensorData, setRealSensorData] = useState({ x: 0, y: 0, z: 0 });
            const [magneticFieldMagnitude, setMagneticFieldMagnitude] = useState(0);

            useEffect(() => {
                audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
                checkSensorAvailability();

                return () => {
                    if (audioContextRef.current) {
                        audioContextRef.current.close();
                    }
                    if (scanIntervalRef.current) {
                        clearInterval(scanIntervalRef.current);
                    }
                    if (magnetometerRef.current) {
                        magnetometerRef.current.stop();
                    }
                };
            }, []);

            const checkSensorAvailability = async () => {
                console.log('Checking for magnetometer sensor...');
                
                // Check if browser supports Generic Sensor API
                if (!('Magnetometer' in window)) {
                    setSensorStatus('unavailable');
                    setSensorError('Your browser does not support the Magnetometer API. Try Chrome on Android or Safari on iOS.');
                    console.log('Magnetometer API not found in window');
                    return;
                }

                try {
                    // Request permission for sensor access
                    if ('permissions' in navigator) {
                        const result = await navigator.permissions.query({ name: 'magnetometer' });
                        console.log('Magnetometer permission:', result.state);
                        
                        if (result.state === 'denied') {
                            setSensorStatus('denied');
                            setSensorError('Magnetometer access denied. Please enable sensor permissions in your browser settings.');
                            return;
                        }
                    }

                    // Try to create magnetometer sensor
                    const sensor = new Magnetometer({ frequency: 10 });
                    
                    sensor.addEventListener('reading', () => {
                        const magnitude = Math.sqrt(sensor.x**2 + sensor.y**2 + sensor.z**2);
                        setRealSensorData({ x: sensor.x, y: sensor.y, z: sensor.z });
                        setMagneticFieldMagnitude(magnitude);
                        console.log('Magnetometer reading:', { x: sensor.x, y: sensor.y, z: sensor.z, magnitude });
                    });

                    sensor.addEventListener('error', (event) => {
                        console.error('Magnetometer error:', event.error);
                        setSensorStatus('error');
                        setSensorError(`Sensor error: ${event.error.name} - ${event.error.message}`);
                    });

                    sensor.start();
                    magnetometerRef.current = sensor;
                    
                    // Wait a bit to see if we get readings
                    setTimeout(() => {
                        if (magneticFieldMagnitude === 0) {
                            setSensorStatus('no_readings');
                            setSensorError('Sensor started but no readings detected. Your device may not have a magnetometer.');
                        } else {
                            setSensorStatus('available');
                            console.log('✅ REAL MAGNETOMETER WORKING!');
                        }
                    }, 1000);

                } catch (error) {
                    console.error('Failed to initialize magnetometer:', error);
                    setSensorStatus('error');
                    setSensorError(`Failed to start sensor: ${error.message}. This feature requires HTTPS and a device with a magnetometer.`);
                }
            };

            const playBeep = (strength) => {
                if (!audioContextRef.current || strength < 60) return;

                const ctx = audioContextRef.current;
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();

                oscillator.frequency.value = 400 + (strength - 60) * 20;
                oscillator.type = 'sine';

                gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);

                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);

                oscillator.start(ctx.currentTime);
                oscillator.stop(ctx.currentTime + 0.1);
            };

            const detectEMField = () => {
                // Use REAL magnetometer data if available
                if (sensorStatus === 'available' && magneticFieldMagnitude > 0) {
                    // Normalize the magnetic field reading to 0-100 scale
                    // Typical Earth's magnetic field is around 25-65 μT
                    // Nearby electronics can add 5-50 μT more
                    const normalizedStrength = Math.min(100, (magneticFieldMagnitude / 100) * 100);
                    return { strength: normalizedStrength, device: null, real: true };
                }

                // If no sensor, return error state
                return { strength: 0, device: null, real: false };
            };

            const startScanning = async () => {
                if (sensorStatus !== 'available') {
                    alert('Cannot start scanning: Magnetometer sensor not available!');
                    return;
                }

                setScanning(true);
                
                scanIntervalRef.current = setInterval(() => {
                    const { strength, device, real } = detectEMField();
                    setEMFieldStrength(strength);

                    if (strength > 70) {
                        setBeepActive(true);
                        playBeep(strength);
                        setTimeout(() => setBeepActive(false), 100);
                    }

                    if (strength > 90 && device) {
                        const alreadyFound = foundLocations.find(
                            loc => Math.abs(loc.x - device.x) < 5 && Math.abs(loc.y - device.y) < 5
                        );
                        if (!alreadyFound) {
                            setFoundLocations(prev => [...prev, {
                                x: userPosition.x,
                                y: userPosition.y,
                                type: 'Device',
                                timestamp: Date.now()
                            }]);
                        }
                    }
                }, 200);
            };

            const stopScanning = () => {
                setScanning(false);
                setEMFieldStrength(0);
                if (scanIntervalRef.current) {
                    clearInterval(scanIntervalRef.current);
                }
            };

            const handleFloorPlanUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setFloorPlan(event.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleMapClick = (e) => {
                if (!scanning) return;
                
                const rect = e.currentTarget.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                
                setUserPosition({ x, y });
            };

            const getSignalColor = (strength) => {
                if (strength < 55) return '#3b82f6';
                if (strength < 70) return '#eab308';
                if (strength < 85) return '#f97316';
                return '#ef4444';
            };

            const getProximityMessage = (strength) => {
                if (sensorStatus !== 'available') return 'Sensor not available';
                if (strength < 55) return 'No devices detected nearby';
                if (strength < 65) return 'Weak signal - keep searching';
                if (strength < 75) return 'Signal detected - getting warmer';
                if (strength < 85) return 'Strong signal - you\'re close!';
                if (strength < 92) return 'VERY STRONG - almost there!';
                return '🎯 DEVICE FOUND! Mark location?';
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 p-4">
                    <div className="max-w-6xl mx-auto">
                        
                        <div className="text-center mb-8">
                            <div className="flex items-center justify-center gap-3 mb-4">
                                <div className="text-cyan-400 animate-pulse"><Radio /></div>
                                <h1 className="text-5xl font-bold text-white">EM Finder</h1>
                                <div className="text-yellow-400"><Zap /></div>
                            </div>
                            <p className="text-xl text-cyan-200 mb-2">
                                REAL Electromagnetic Device Tracker
                            </p>
                            <p className="text-sm text-cyan-300">
                                Uses your device's actual magnetometer sensor!
                            </p>
                        </div>

                        {/* SENSOR STATUS - BIG AND CLEAR */}
                        <div className="mb-8">
                            {sensorStatus === 'checking' && (
                                <div className="bg-yellow-500/20 border-2 border-yellow-500 rounded-xl p-6 text-center">
                                    <div className="animate-spin w-12 h-12 border-4 border-yellow-400 border-t-transparent rounded-full mx-auto mb-4"></div>
                                    <h3 className="text-yellow-300 text-xl font-bold">Checking for magnetometer sensor...</h3>
                                </div>
                            )}

                            {sensorStatus === 'available' && (
                                <div className="bg-green-500/20 border-2 border-green-500 rounded-xl p-6 text-center">
                                    <div className="text-green-400 mx-auto mb-4"><CheckCircle /></div>
                                    <h3 className="text-green-300 text-xl font-bold mb-2">✅ REAL MAGNETOMETER SENSOR DETECTED!</h3>
                                    <p className="text-green-200 text-sm">Your device has a working magnetometer! You can track real electromagnetic fields!</p>
                                    <div className="mt-4 bg-green-500/30 rounded-lg p-3">
                                        <p className="text-green-100 text-xs font-bold">LIVE SENSOR DATA:</p>
                                        <p className="text-green-100 text-sm font-mono">
                                            X: {realSensorData.x.toFixed(2)} μT | 
                                            Y: {realSensorData.y.toFixed(2)} μT | 
                                            Z: {realSensorData.z.toFixed(2)} μT
                                        </p>
                                        <p className="text-green-100 text-sm font-mono mt-1">
                                            Magnitude: {magneticFieldMagnitude.toFixed(2)} μT
                                        </p>
                                    </div>
                                </div>
                            )}

                            {(sensorStatus === 'unavailable' || sensorStatus === 'denied' || sensorStatus === 'error' || sensorStatus === 'no_readings') && (
                                <div className="bg-red-500/20 border-2 border-red-500 rounded-xl p-6 text-center">
                                    <div className="text-red-400 mx-auto mb-4"><AlertCircle /></div>
                                    <h3 className="text-red-300 text-2xl font-bold mb-2">❌ NO MAGNETOMETER SENSOR AVAILABLE</h3>
                                    <p className="text-red-200 mb-4">{sensorError}</p>
                                    
                                    <div className="bg-red-500/30 rounded-lg p-4 text-left">
                                        <p className="text-red-100 font-bold mb-2">Why this might not work:</p>
                                        <ul className="text-red-200 text-sm space-y-1">
                                            <li>• Your device doesn't have a magnetometer sensor (most laptops don't have one)</li>
                                            <li>• You're using HTTP instead of HTTPS (sensor API requires secure connection)</li>
                                            <li>• Your browser doesn't support the Magnetometer API</li>
                                            <li>• Sensor permissions were denied</li>
                                        </ul>
                                    </div>

                                    <div className="mt-4 bg-blue-500/30 rounded-lg p-4 text-left">
                                        <p className="text-blue-100 font-bold mb-2">✅ To use this app:</p>
                                        <ul className="text-blue-200 text-sm space-y-1">
                                            <li>• Use a SMARTPHONE (iPhone or Android) - not a laptop/desktop</li>
                                            <li>• Open this file on HTTPS (upload to a secure web server)</li>
                                            <li>• Use Chrome on Android or Safari on iOS</li>
                                            <li>• Grant sensor permissions when asked</li>
                                        </ul>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="grid md:grid-cols-3 gap-6">
                            
                            <div className="space-y-4">
                                
                                <div className="bg-white/10 backdrop-blur-sm rounded-xl p-6 border border-cyan-500/30">
                                    <h3 className="text-white font-bold text-lg mb-4 flex items-center gap-2">
                                        <Upload />
                                        1. Upload Floor Plan
                                    </h3>
                                    <input
                                        type="file"
                                        accept="image/*"
                                        onChange={handleFloorPlanUpload}
                                        className="hidden"
                                        id="floorplan-upload"
                                    />
                                    <label
                                        htmlFor="floorplan-upload"
                                        className="block w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-3 px-4 rounded-lg cursor-pointer text-center transition"
                                    >
                                        Choose File
                                    </label>
                                    {floorPlan && (
                                        <p className="text-green-400 text-sm mt-2 flex items-center gap-2">
                                            <MapPin />
                                            Floor plan loaded!
                                        </p>
                                    )}
                                </div>

                                <div className="bg-white/10 backdrop-blur-sm rounded-xl p-6 border border-cyan-500/30">
                                    <h3 className="text-white font-bold text-lg mb-4 flex items-center gap-2">
                                        <Target />
                                        2. Start Scanning
                                    </h3>
                                    {!scanning ? (
                                        <button
                                            onClick={startScanning}
                                            disabled={!floorPlan || sensorStatus !== 'available'}
                                            className="w-full bg-gradient-to-r from-green-500 to-emerald-500 hover:from-green-600 hover:to-emerald-600 disabled:from-gray-500 disabled:to-gray-600 text-white font-bold py-4 px-6 rounded-lg transition-all transform hover:scale-105 disabled:cursor-not-allowed"
                                        >
                                            {sensorStatus !== 'available' ? 'Sensor not available!' : 
                                             !floorPlan ? 'Upload floor plan first' : 
                                             'START REAL SCANNING'}
                                        </button>
                                    ) : (
                                        <button
                                            onClick={stopScanning}
                                            className="w-full bg-gradient-to-r from-red-500 to-pink-500 hover:from-red-600 hover:to-pink-600 text-white font-bold py-4 px-6 rounded-lg transition-all"
                                        >
                                            STOP SCANNING
                                        </button>
                                    )}
                                </div>

                                <div className="bg-white/10 backdrop-blur-sm rounded-xl p-6 border border-cyan-500/30">
                                    <h3 className="text-white font-bold text-lg mb-4 flex items-center gap-2">
                                        <Wifi />
                                        EM Field Strength
                                    </h3>

                                    <div className="relative w-full h-8 bg-slate-800 rounded-full overflow-hidden mb-3">
                                        <div
                                            className="h-full transition-all duration-300"
                                            style={{
                                                width: `${Math.min(emFieldStrength, 100)}%`,
                                                backgroundColor: getSignalColor(emFieldStrength)
                                            }}
                                        />
                                    </div>
                                    
                                    <div className="flex justify-between text-xs text-cyan-300 mb-4">
                                        <span>Weak</span>
                                        <span>Medium</span>
                                        <span>Strong</span>
                                        <span>FOUND!</span>
                                    </div>

                                    <div className={`text-center font-bold text-lg p-3 rounded-lg ${
                                        emFieldStrength > 85 ? 'bg-red-500/30 text-red-300 animate-pulse' :
                                        emFieldStrength > 70 ? 'bg-orange-500/30 text-orange-300' :
                                        emFieldStrength > 60 ? 'bg-yellow-500/30 text-yellow-300' :
                                        'bg-blue-500/30 text-blue-300'
                                    }`}>
                                        {getProximityMessage(emFieldStrength)}
                                    </div>

                                    {beepActive && (
                                        <div className="mt-3 flex items-center justify-center gap-2 text-yellow-400">
                                            <div className="animate-pulse"><Volume2 /></div>
                                            <span className="font-bold">BEEP!</span>
                                        </div>
                                    )}

                                    <div className="mt-4 text-cyan-300 text-sm">
                                        <p className="font-semibold mb-2">
                                            {sensorStatus === 'available' ? 
                                                `REAL Reading: ${magneticFieldMagnitude.toFixed(1)} μT` :
                                                'No sensor data'
                                            }
                                        </p>
                                        <p className="text-xs">
                                            {sensorStatus === 'available' ? '🟢 Using REAL magnetometer' : '🔴 Sensor unavailable'}
                                        </p>
                                    </div>
                                </div>

                                {foundLocations.length > 0 && (
                                    <div className="bg-white/10 backdrop-blur-sm rounded-xl p-6 border border-green-500/30">
                                        <h3 className="text-white font-bold text-lg mb-4 flex items-center gap-2">
                                            <MapPin />
                                            Devices Found: {foundLocations.length}
                                        </h3>
                                        <div className="space-y-2">
                                            {foundLocations.map((loc, idx) => (
                                                <div key={idx} className="bg-green-500/20 p-3 rounded-lg">
                                                    <div className="flex items-center gap-2 text-green-300">
                                                        <Smartphone />
                                                        <span className="font-semibold">{loc.type}</span>
                                                    </div>
                                                    <p className="text-xs text-green-400 mt-1">
                                                        Position: ({loc.x.toFixed(1)}, {loc.y.toFixed(1)})
                                                    </p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                            </div>

                            <div className="md:col-span-2">
                                <div className="bg-white/10 backdrop-blur-sm rounded-xl p-6 border border-cyan-500/30">
                                    <h3 className="text-white font-bold text-lg mb-4">Floor Plan Scanner</h3>
                                    
                                    <div
                                        onClick={handleMapClick}
                                        className="relative w-full aspect-square bg-slate-800 rounded-lg overflow-hidden cursor-crosshair border-4 border-cyan-500/50"
                                        style={{
                                            backgroundImage: floorPlan ? `url(${floorPlan})` : 'none',
                                            backgroundSize: 'cover',
                                            backgroundPosition: 'center'
                                        }}
                                    >
                                        {!floorPlan && (
                                            <div className="absolute inset-0 flex items-center justify-center">
                                                <div className="text-center text-cyan-400">
                                                    <div className="mx-auto mb-4 opacity-50"><Camera /></div>
                                                    <p className="text-lg">Upload your floor plan to begin</p>
                                                </div>
                                            </div>
                                        )}

                                        {scanning && (
                                            <div
                                                className="absolute w-8 h-8 -ml-4 -mt-4 transition-all duration-200"
                                                style={{
                                                    left: `${userPosition.x}%`,
                                                    top: `${userPosition.y}%`
                                                }}
                                            >
                                                <div className="relative">
                                                    <div className="absolute inset-0 bg-blue-500 rounded-full opacity-75 animate-ping"></div>
                                                    <div className="absolute inset-0 bg-blue-400 rounded-full opacity-50"></div>
                                                    <div className="relative w-8 h-8 bg-blue-500 rounded-full border-4 border-white flex items-center justify-center">
                                                        <Smartphone />
                                                    </div>
                                                    {emFieldStrength > 60 && (
                                                        <div
                                                            className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 rounded-full border-2 border-yellow-400 opacity-50 animate-pulse"
                                                            style={{
                                                                width: `${(emFieldStrength - 50) * 2}px`,
                                                                height: `${(emFieldStrength - 50) * 2}px`
                                                            }}
                                                        />
                                                    )}
                                                </div>
                                            </div>
                                        )}

                                        {foundLocations.map((loc, idx) => (
                                            <div
                                                key={idx}
                                                className="absolute w-12 h-12 -ml-6 -mt-6"
                                                style={{
                                                    left: `${loc.x}%`,
                                                    top: `${loc.y}%`
                                                }}
                                            >
                                                <div className="relative">
                                                    <div className="absolute inset-0 bg-green-500 rounded-full opacity-50 animate-ping"></div>
                                                    <div className="w-12 h-12 bg-green-500 rounded-full border-4 border-white flex items-center justify-center">
                                                        <MapPin />
                                                    </div>
                                                    <div className="absolute -bottom-8 left-1/2 transform -translate-x-1/2 bg-green-500 text-white text-xs px-2 py-1 rounded whitespace-nowrap">
                                                        {loc.type}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}

                                        {floorPlan && (
                                            <div className="absolute inset-0 pointer-events-none"
                                                style={{
                                                    backgroundImage: 'linear-gradient(rgba(6, 182, 212, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(6, 182, 212, 0.1) 1px, transparent 1px)',
                                                    backgroundSize: '10% 10%'
                                                }}
                                            />
                                        )}
                                    </div>

                                    <div className="mt-4 bg-cyan-500/20 rounded-lg p-4">
                                        <h4 className="text-cyan-300 font-bold mb-2">📱 How to Use:</h4>
                                        <ul className="text-cyan-200 text-sm space-y-1">
                                            <li>1️⃣ Make sure sensor is detected (green box above)</li>
                                            <li>2️⃣ Upload your house floor plan</li>
                                            <li>3️⃣ Click "START REAL SCANNING"</li>
                                            <li>4️⃣ Walk around and TAP where you are on the map</li>
                                            <li>5️⃣ Watch the REAL magnetic field readings change!</li>
                                        </ul>
                                    </div>

                                </div>
                            </div>

                        </div>

                    </div>
                </div>
            );
        };

        ReactDOM.render(<EMFinder />, document.getElementById('root'));
    </script>
</body>
</html>
